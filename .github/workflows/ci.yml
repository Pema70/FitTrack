name: FitTrack CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fittrack_test
          POSTGRES_USER: fittrack
          POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Build & test
        env:
          DB_URL: jdbc:postgresql://localhost:5432/fittrack_test
          DB_USER: fittrack
          DB_PASS: secret
          JWT_SECRET: ci-secret-key-min-32-chars-fittrack-!!
        run: ./gradlew build jacocoTestReport --no-daemon
        working-directory: backend

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/build/reports/jacoco/test/html/

      - name: Check coverage threshold (60%)
        run: ./gradlew jacocoTestCoverageVerification --no-daemon
        working-directory: backend
