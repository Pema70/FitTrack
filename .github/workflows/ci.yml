name: FitTrack CI

on:
  push:
    branches: [main, develop]
    paths:
      
'Backend/'
    
'.github/workflows/
'
pull_request:
  branches: [main, develop]
  paths:
'Backend/'
  
'.github/workflows/
'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    env:
      DB_URL: jdbc:postgresql://localhost:5432/fittrack_test
      DB_USER: fittrack
      DB_PASS: secret
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fittrack_test
          POSTGRES_USER: fittrack
          POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U fittrack -d fittrack_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      
uses: actions/checkout@v4

      
name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: "17"
        distribution: temurin
        cache: gradle

      
name: Make gradlew executable
      run: chmod +x ./gradlew

      
name: Build & test
      run: ./gradlew build jacocoTestReport --no-daemon --parallel --build-cache

      
name: Check coverage threshold (60%)
      run: ./gradlew jacocoTestCoverageVerification --no-daemon

      
name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-report
        path: Backend/build/reports/jacoco/test/html/
        retention-days: 7

      
name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: Backend/build/reports/tests/test/
        retention-days: 7